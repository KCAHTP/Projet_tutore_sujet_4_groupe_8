<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection de Classe</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="accueil.css">
</head>
<body>

    <div class="card">
        <h2>Sélectionner une classe</h2>

        <select id="classeSelect" class="styled-select">
            <option value="" disabled selected>-- Choisissez votre classe --</option>
            <option value="1|Licence 1">Licence 1</option>
            <option value="2|Licence 2">Licence 2</option>
            <optgroup label="Licence 3">
                <option value="3|L3 - ISI">L3 - ISI</option>
                <option value="4|L3 - IRS">L3 - IRS</option>
            </optgroup>
            <optgroup label="Master 1">
                <option value="5|M1 - SIDSAD">M1 - SIDSAD</option>
                <option value="6|M1 - SISD">M1 - SISD</option>
                <option value="7|M1 - RSCAR">M1 - RSCAR</option>
                <option value="8|M1 - RSCS">M1 - RSCS</option>
            </optgroup>
            <optgroup label="Master 2">
                <option value="9|M2 - SIDSAD">M2 - SIDSAD</option>
                <option value="10|M2 - SISD">M2 - SISD</option>
                <option value="11|M2 - RSCAR">M2 - RSCAR</option>
                <option value="12|M2 - RSCS">M2 - RSCS</option>
            </optgroup>
        </select>

        <button id="validerBtn">Valider le choix</button>
    </div>

    <script src="accueil.js"></script>
    <script src="Sidebar.js"></script> 
</body>
</html>
