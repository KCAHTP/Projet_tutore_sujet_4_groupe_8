<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Précédences</title>
    <link rel="stylesheet" href="precedence.css">
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <script src="Sidebar.js"></script>

    <div class="page-wrapper">
        <form id="precedenceForm">
            <h1>Gestion des Précédences</h1>
        
            <label for="predecesseurSelect">Prédécesseur (à valider en premier) :</label>
            <select id="predecesseurSelect" required>            
                <option value="">Chargement...</option>
            </select>

            <label for="moduleSelect">Module (à valider après) :</label>
            <select id="moduleSelect" required>            
                <option value="">Chargement...</option>
            </select>

            <button type="submit">Enregistrer la précédence</button>
        </form>

        <table id="tableau-precedences-container">
            <thead>
                <tr>
                    <th>Prédécesseur</th>
                    <th>Module</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableau-precedences"></tbody>
        </table> 
    </div>   

    <script src="config.js"></script>
    <script src="precedence.js"></script>
    
</body>
</html>
