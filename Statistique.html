<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="tableau_bord.css">
    <link rel="stylesheet" href="global.css">
</head>
<body>

    <script src="Sidebar.js"></script>

    <main class="main-content">
        <h1 id="welcomeMessage"></h1>
        <p>Voici l'aperçu de votre espace de gestion.</p>

        <!-- Cartes résumé -->
        <div class="stats-cards">
            <div class="card">
                <h3>Total évaluations</h3>
                <p id="total">—</p>
            </div>
            <div class="card">
                <h3>Terminées</h3>
                <p id="terminees">—</p>
            </div>
            <div class="card">
                <h3>Planifiées</h3>
                <p id="planifiees">—</p>
            </div>
            <div class="card">
                <h3>En cours</h3>
                <p id="encours">—</p>
            </div>
            <div class="card">
                <h3>En retard</h3>
                <p id="retard">—</p>
            </div>
        </div>

        <!-- Barre de progression -->
        <div class="progress-section">
            <h2>Avancement global</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>
            <p id="pourcentage">0%</p>
        </div>

        <!-- Tableau par classe -->
        <div class="table-section">
            <h2>Statistiques par classe</h2>
            <table>
                <thead>
                    <tr>
                        <th>Classe</th>
                        <th>Total évaluations</th>
                        <th>Terminées</th>
                        <th>Avancement</th>
                    </tr>
                </thead>
                <tbody id="table-classes"></tbody>
            </table>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="Statistique.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const className = localStorage.getItem('classe_choisie');
            const welcomeMessage = document.getElementById('welcomeMessage');
            if (className) {
                welcomeMessage.textContent = `Bienvenue dans la classe ${className}`;
            } else {
                welcomeMessage.textContent = "Bienvenue (Aucune classe sélectionnée)";
            }
        });
    </script>
</body>
</html>
