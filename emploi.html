<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emploi du Temps</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="emploi.css" />
</head>
<body>
  <script src="Sidebar.js"></script>
  <div class="main-content">

    <div class="planning-container">

      <div class="planning-header">
        <h2 id="titre-classe">Emploi Du Temps</h2>
        <button onclick="exporterPDF()" class="btn-pdf">📄 Exporter en PDF</button>
      </div>

      <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-form">
          <h3>Ajouter un cours</h3>
          <p>Date : <strong id="date-selectionnee"></strong></p>
          <div class="form-group">
            <label>Module (EC) :</label>
            <select id="module"><option value="">-- Choisir un module --</option></select>
          </div>
          <div class="form-group">
            <label>Enseignant :</label>
            <select id="enseignant"><option value="">-- Choisir un enseignant --</option></select>
          </div>
          <div class="form-group">
            <label>Heure début :</label>
            <input type="time" id="heure-debut" value="08:00" />
          </div>
          <div class="form-group">
            <label>Heure fin :</label>
            <input type="time" id="heure-fin" value="10:00" />
          </div>
          <div class="form-actions">
            <button onclick="enregistrer()" class="btn-submit">Enregistrer</button>
            <button onclick="fermerModal()" class="btn-cancel">Annuler</button>
          </div>
        </div>
      </div>

      <div id="modal-suppression" class="modal-overlay" style="display:none;">
        <div class="modal-form">
          <h3>Supprimer ce cours ?</h3>
          <p id="info-cours-suppression"></p>
          <div class="form-actions">
            <button onclick="confirmerSuppression()" class="btn-delete">Supprimer</button>
            <button onclick="fermerModalSuppression()" class="btn-cancel">Annuler</button>
          </div>
        </div>
      </div>

      <div id="calendrier"></div>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales/fr.global.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="emploi.js"></script>

</body>
</html>
