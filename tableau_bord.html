<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="tableau_bord.css">
    <link rel="stylesheet" href="global.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <script src="Sidebar.js"></script>

    <main class="main-content">
        <h1 id="welcomeMessage">Bienvenue...</h1>
        <p>Aperçu de l'espace de gestion</p>

        <div class="stats-cards">
            <div class="card">
                <h3>Total évaluations</h3>
                <p id="total-evals">—</p>
            </div>
            <div class="card">
                <h3>Planifiées</h3>
                <p id="total-planifiees">—</p>
            </div>
            <div class="card">
                <h3>Terminées</h3>
                <p id="total-terminees">—</p>
            </div>
            <div class="card">
                <h3>En retard</h3>
                <p id="total-retard">—</p>
            </div>
            <div class="card">
                <h3>Alertes actives</h3>
                <p id="total-alertes">—</p>
            </div>
        </div>

        <div class="progress-section">
            <h2>Avancement global</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>
            <p id="avancement-global">—</p>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="tableau_bord.js"></script>
    
</body>
</html>
