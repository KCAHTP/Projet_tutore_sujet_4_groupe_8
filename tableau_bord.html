<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="tableau_bord.css">
    <link rel="stylesheet" href="global.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <script src="Sidebar.js"></script>

    <main class="main-content">
        <h1 id="welcomeMessage">Bienvenue...</h1>
        <p class="sous-titre">Aperçu de l'espace de gestion</p>

        <!-- Cartes chiffres clés -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total EC</span>
                <span class="stat-value" id="total-ec">—</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Évaluations planifiées</span>
                <span class="stat-value" id="total-planifiees">—</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Évaluations terminées</span>
                <span class="stat-value" id="total-terminees">—</span>
            </div>
            <div class="stat-card alerte-card">
                <span class="stat-label">Alertes actives</span>
                <span class="stat-value" id="total-alertes">—</span>
            </div>
        </div>

        <!-- Barre d'avancement global -->
        <div class="avancement-section">
            <p><strong>Avancement global :</strong> <span id="avancement-global">—</span></p>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="tableau_bord.js"></script>

</body>
</html>
