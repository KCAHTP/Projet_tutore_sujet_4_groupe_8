<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de Bord</title>
    <link rel="stylesheet" href="tableau_bord.css">
    <link rel="stylesheet" href="global.css">
</head>
<body>

    <main class="main-content">
        <h1 id="welcomeMessage">Bienvenue dans la classe...</h1>
        <p>Voici l'aperçu de votre espace de gestion.</p>
    </main>

    <script src="Sidebar.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const className = localStorage.getItem('classe_choisie');
            const welcomeMessage = document.getElementById('welcomeMessage');

            if (className) {
                welcomeMessage.textContent = `Bienvenue dans la classe ${className}`;
            } else {
                welcomeMessage.textContent = "Bienvenue (Aucune classe sélectionnée)";
            }
        });
    </script>
</body>
</html>
